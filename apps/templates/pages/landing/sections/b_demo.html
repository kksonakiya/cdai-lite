<section id="demo" class="demo-section">

    <div class="container">

        <!-- HEADER -->
        <div class="text-center mb-5">
            <h2 class="section-title">Try it instantly</h2>
            <p class="section-subtitle">
                Generate multiple design variations and pick the best — just like your real workflow.
            </p>
        </div>

        <div class="row g-4">

            <!-- LEFT: INPUT PANEL -->
            <div class="col-lg-4">

                <div class="demo-panel">

                    <label class="demo-label">Prompt</label>

                    <textarea 
                        class="demo-input" 
                        placeholder="Minimalist cat t-shirt design..."

                    <button class="demo-add">

                    </button>

                    <label class="demo-label mt-4">Style</label>

                    <div class="demo-tags">

                    <button class="demo-run mt-4">

                    </button>

                </div>

            </div>

            <!-- RIGHT: RESULTS -->
            <div class="col-lg-8">

                <div class="demo-results">

                    <div class="row g-3">

                        <div class="col-md-4">
                            <div class="result-card">
                                <div class="result-img"></div>
                                <div class="result-meta">Prompt A</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="result-card selected">
                                <div class="result-img"></div>
                                <div class="result-meta">Prompt B ✓</div>
                            </div>
                        </div>

                        <div class="col-md-4">
                            <div class="result-card">
                                <div class="result-img"></div>
                                <div class="result-meta">Prompt C</div>

                </div>
