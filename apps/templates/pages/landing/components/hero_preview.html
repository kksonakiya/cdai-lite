<style>
  /* LABEL */
  .hero-preview-label {
    font-size: 0.85rem;
    color: #6b7280;
  }

  /* TABS (SEGMENTED STYLE) */
  .hero-tabs {
    background: #eef2ff;
    padding: 4px;
    border-radius: 999px;
    display: inline-flex;
    gap: 4px;
  }

  .hero-tabs .nav-link {
    border: none;
    font-size: 0.8rem;
    padding: 5px 12px;
    border-radius: 999px;
    color: #6b7280;
    background: transparent;
    transition: all 0.2s ease;
  }

  .hero-tabs .nav-link.active {
    background: #ffffff;
    color: #4f46e5;
    box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
  }

  /* TAB CONTENT */
  .hero-tab-content {
    min-height: 160px;
  }

  /* CARD */
  .preview-card {
    position: relative;
    border-radius: 14px;
    overflow: hidden;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  /* IMAGE */
  .preview-card img {
    width: 100%;
    /* height: 150px; */
    object-fit: cover;
    display: block;
  }

  /* OVERLAY */
  .preview-overlay {
    display: none;
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 6px 8px;
    background: linear-gradient(to top, rgba(0, 0, 0, 0.65), transparent);
    font-size: 0.7rem;
    color: #fff;
  }

  /* BADGE */
  .preview-badge {
    position: absolute;
    top: 6px;
    right: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    background: linear-gradient(90deg, #7c3aed, #ec4899);
    color: #fff;
    padding: 3px 6px;
    border-radius: 6px;
  }

  /* SELECTED */
  .preview-card.selected {
    transform: scale(1.06);
    box-shadow: 0 12px 28px rgba(99, 102, 241, 0.35);
    z-index: 2;
  }

  /* HOVER */
  .preview-card:hover {
    transform: translateY(-4px);
  }

  /* FOOTNOTE */
  .hero-footnote {
    font-size: 0.8rem;
    color: #6b7280;
  }
</style>

<!-- TABS -->
<ul class="nav hero-tabs mb-3" role="tablist">

  </li>

  <li class="nav-item">

      Minimal
    </button>
  </li>
</ul>
